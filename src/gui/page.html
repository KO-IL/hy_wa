<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>wall-set</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #0a0e14;
      --panel: rgba(20, 27, 38, 0.85);
      --panel-solid: #141b26;
      --text: #e6edf3;
      --muted: #7d8590;
      --accent: #3fb950;
      --accent-glow: rgba(63, 185, 80, 0.4);
      --accent-soft: rgba(63, 185, 80, 0.15);
      --border: rgba(255, 255, 255, 0.08);
      --border-hover: rgba(255, 255, 255, 0.15);
      --danger: #f85149;
      --danger-soft: rgba(248, 81, 73, 0.15);
      --blue: #58a6ff;
      --purple: #bc8cff;
      --radius: 16px;
      --radius-sm: 10px;
      --shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      background: var(--bg);
      color: var(--text);
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      overflow-x: hidden;
    }

    .bg-effects {
      position: fixed;
      inset: 0;
      z-index: 0;
      pointer-events: none;
      overflow: hidden;
    }

    .bg-effects::before {
      content: '';
      position: absolute;
      width: 600px;
      height: 600px;
      top: -200px;
      left: -100px;
      background: radial-gradient(circle, rgba(63, 185, 80, 0.12) 0%, transparent 70%);
      animation: float 20s ease-in-out infinite;
    }

    .bg-effects::after {
      content: '';
      position: absolute;
      width: 500px;
      height: 500px;
      bottom: -150px;
      right: -100px;
      background: radial-gradient(circle, rgba(88, 166, 255, 0.1) 0%, transparent 70%);
      animation: float 25s ease-in-out infinite reverse;
    }

    @keyframes float {
      0%, 100% { transform: translate(0, 0) scale(1); }
      33% { transform: translate(30px, -30px) scale(1.05); }
      66% { transform: translate(-20px, 20px) scale(0.95); }
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @keyframes slideUp {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .app {
      position: relative;
      z-index: 1;
      max-width: 1400px;
      margin: 0 auto;
      padding: 32px 24px;
    }

    /* Header */
    .header {
      display: flex;
      align-items: center;
      gap: 16px;
      margin-bottom: 28px;
      animation: fadeIn 0.5s ease;
    }

    .logo {
      width: 48px;
      height: 48px;
      background: linear-gradient(135deg, var(--accent), var(--blue));
      border-radius: 14px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 24px;
      font-weight: 700;
      box-shadow: 0 4px 20px var(--accent-glow);
    }

    .header-text h1 {
      font-size: 28px;
      font-weight: 700;
      letter-spacing: -0.5px;
      background: linear-gradient(135deg, var(--text), var(--muted));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .header-text .sub {
      color: var(--muted);
      font-size: 13px;
      margin-top: 2px;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .header-text .sub::before {
      content: '';
      width: 6px;
      height: 6px;
      background: var(--accent);
      border-radius: 50%;
      box-shadow: 0 0 8px var(--accent-glow);
    }

    /* Toolbar */
    .toolbar {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      align-items: center;
      padding: 16px 20px;
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      animation: fadeIn 0.5s ease 0.1s both;
    }

    .input-group {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .input-group label {
      color: var(--muted);
      font-size: 12px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .toolbar input[type="text"] {
      background: rgba(0, 0, 0, 0.3);
      color: var(--text);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      padding: 10px 14px;
      font-size: 13px;
      font-family: inherit;
      min-width: 180px;
      transition: all 0.2s ease;
    }

    .toolbar input[type="text"]:focus {
      outline: none;
      border-color: var(--accent);
      box-shadow: 0 0 0 3px var(--accent-soft);
    }

    .toolbar input[type="text"]::placeholder {
      color: var(--muted);
      opacity: 0.6;
    }

    .btn {
      background: var(--panel-solid);
      color: var(--text);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      padding: 10px 16px;
      font-size: 13px;
      font-weight: 500;
      font-family: inherit;
      cursor: pointer;
      transition: all 0.2s ease;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .btn:hover {
      border-color: var(--border-hover);
      background: rgba(255, 255, 255, 0.05);
      transform: translateY(-1px);
    }

    .btn:active { transform: translateY(0); }

    .btn-accent {
      background: var(--accent-soft);
      border-color: rgba(63, 185, 80, 0.3);
      color: var(--accent);
    }

    .btn-accent:hover {
      background: rgba(63, 185, 80, 0.25);
      border-color: var(--accent);
      box-shadow: 0 0 16px var(--accent-soft);
    }

    .separator {
      width: 1px;
      height: 24px;
      background: var(--border);
      margin: 0 4px;
    }

    /* Volume Control */
    .volume-control {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-left: auto;
      padding: 6px 12px;
      background: rgba(0, 0, 0, 0.2);
      border-radius: var(--radius-sm);
    }

    .volume-icon { color: var(--muted); font-size: 16px; }

    .volume-slider {
      -webkit-appearance: none;
      appearance: none;
      width: 100px;
      height: 4px;
      background: var(--border);
      border-radius: 2px;
      outline: none;
      cursor: pointer;
    }

    .volume-slider::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 14px;
      height: 14px;
      background: var(--accent);
      border-radius: 50%;
      cursor: pointer;
      box-shadow: 0 0 8px var(--accent-glow);
      transition: transform 0.15s ease;
    }

    .volume-slider::-webkit-slider-thumb:hover { transform: scale(1.2); }

    .volume-slider::-moz-range-thumb {
      width: 14px;
      height: 14px;
      background: var(--accent);
      border-radius: 50%;
      cursor: pointer;
      border: none;
      box-shadow: 0 0 8px var(--accent-glow);
    }

    .volume-value {
      color: var(--text);
      font-size: 12px;
      font-weight: 600;
      min-width: 40px;
      text-align: right;
      font-variant-numeric: tabular-nums;
    }

    .vol-btn {
      width: 26px;
      height: 26px;
      background: rgba(255, 255, 255, 0.05);
      color: var(--muted);
      border: 1px solid var(--border);
      border-radius: 8px;
      cursor: pointer;
      font-size: 14px;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.15s ease;
    }

    .vol-btn:hover {
      color: var(--text);
      border-color: var(--border-hover);
      background: rgba(255, 255, 255, 0.1);
    }

    /* Stats Bar */
    .stats-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-top: 20px;
      padding: 14px 20px;
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      animation: fadeIn 0.5s ease 0.2s both;
    }

    .stat-item { display: flex; align-items: center; gap: 8px; }

    .stat-icon {
      width: 32px;
      height: 32px;
      background: var(--accent-soft);
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 14px;
    }

    .stat-info .stat-value { font-size: 16px; font-weight: 700; color: var(--text); }
    .stat-info .stat-label {
      font-size: 11px;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    /* Status Toast */
    .status-toast {
      margin-top: 16px;
      padding: 12px 16px;
      border-radius: var(--radius-sm);
      font-size: 13px;
      font-weight: 500;
      display: flex;
      align-items: center;
      gap: 8px;
      animation: slideUp 0.3s ease;
      transition: all 0.3s ease;
    }

    .status-toast.success {
      background: var(--accent-soft);
      border: 1px solid rgba(63, 185, 80, 0.3);
      color: var(--accent);
    }

    .status-toast.error {
      background: var(--danger-soft);
      border: 1px solid rgba(248, 81, 73, 0.3);
      color: var(--danger);
    }

    .status-toast.info {
      background: rgba(88, 166, 255, 0.1);
      border: 1px solid rgba(88, 166, 255, 0.3);
      color: var(--blue);
    }

    /* Grid */
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
      gap: 16px;
      margin-top: 20px;
      animation: fadeIn 0.5s ease 0.3s both;
    }

    /* Card */
    .card {
      all: unset;
      display: block;
      cursor: pointer;
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      position: relative;
    }

    .card::before {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(180deg, transparent 50%, rgba(0, 0, 0, 0.4) 100%);
      opacity: 0;
      transition: opacity 0.3s ease;
      z-index: 1;
      pointer-events: none;
    }

    .card:hover {
      border-color: var(--accent);
      transform: translateY(-6px);
      box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4), 0 0 0 1px var(--accent-soft);
    }

    .card:hover::before { opacity: 1; }

    .card.selected {
      border-color: var(--accent);
      box-shadow: 0 0 0 2px var(--accent), 0 20px 40px rgba(0, 0, 0, 0.3);
    }

    .card.selected::after {
      content: '✓';
      position: absolute;
      top: 12px;
      left: 12px;
      width: 28px;
      height: 28px;
      background: var(--accent);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 14px;
      font-weight: 700;
      color: #000;
      z-index: 10;
      box-shadow: 0 4px 12px var(--accent-glow);
      animation: scaleIn 0.2s ease;
    }

    @keyframes scaleIn {
      from { transform: scale(0); }
      to { transform: scale(1); }
    }

    .thumb-wrap {
      position: relative;
      width: 100%;
      height: 150px;
      overflow: hidden;
      background: rgba(0, 0, 0, 0.3);
    }

    .thumb {
      width: 100%;
      height: 100%;
      object-fit: cover;
      transition: transform 0.4s ease;
    }

    .card:hover .thumb { transform: scale(1.08); }

    .kind-badge {
      position: absolute;
      top: 10px;
      right: 10px;
      padding: 4px 10px;
      border-radius: 20px;
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 0.5px;
      text-transform: uppercase;
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      z-index: 2;
    }

    .kind-badge.image {
      background: rgba(63, 185, 80, 0.2);
      color: var(--accent);
      border: 1px solid rgba(63, 185, 80, 0.3);
    }

    .kind-badge.video {
      background: rgba(88, 166, 255, 0.2);
      color: var(--blue);
      border: 1px solid rgba(88, 166, 255, 0.3);
    }

    .kind-badge.project {
      background: rgba(188, 140, 255, 0.2);
      color: var(--purple);
      border: 1px solid rgba(188, 140, 255, 0.3);
    }

    .video-placeholder {
      width: 100%;
      height: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 8px;
      background: linear-gradient(135deg, rgba(88, 166, 255, 0.1), rgba(188, 140, 255, 0.1));
    }

    .video-placeholder .icon { font-size: 32px; opacity: 0.6; }
    .video-placeholder .label {
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: var(--muted);
    }

    .meta { padding: 14px; }

    .meta .name {
      font-size: 14px;
      font-weight: 600;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      color: var(--text);
    }

    .meta .path {
      font-size: 11px;
      color: var(--muted);
      margin-top: 6px;
      overflow: hidden;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      word-break: break-all;
      line-height: 1.4;
    }

    /* Preview Modal */
    .preview-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.85);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      z-index: 1000;
      display: flex;
      align-items: center;
      justify-content: center;
      animation: fadeIn 0.2s ease;
      cursor: pointer;
    }

    .preview-content {
      position: relative;
      max-width: 90vw;
      max-height: 85vh;
      animation: zoomIn 0.25s ease;
    }

    @keyframes zoomIn {
      from { transform: scale(0.9); opacity: 0; }
      to { transform: scale(1); opacity: 1; }
    }

    .preview-content img {
      max-width: 100%;
      max-height: 85vh;
      border-radius: var(--radius);
      box-shadow: 0 25px 80px rgba(0, 0, 0, 0.6);
      object-fit: contain;
    }

    .preview-content video {
      max-width: 100%;
      max-height: 85vh;
      border-radius: var(--radius);
      box-shadow: 0 25px 80px rgba(0, 0, 0, 0.6);
    }

    .preview-info {
      position: absolute;
      bottom: -50px;
      left: 0;
      right: 0;
      text-align: center;
    }

    .preview-info .name {
      font-size: 16px;
      font-weight: 600;
      color: var(--text);
      margin-bottom: 4px;
    }

    .preview-info .path {
      font-size: 12px;
      color: var(--muted);
    }

    .preview-close {
      position: absolute;
      top: -40px;
      right: 0;
      width: 36px;
      height: 36px;
      background: rgba(255, 255, 255, 0.1);
      border: 1px solid rgba(255, 255, 255, 0.2);
      border-radius: 50%;
      color: var(--text);
      font-size: 18px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.2s ease;
    }

    .preview-close:hover {
      background: rgba(255, 255, 255, 0.2);
      transform: scale(1.1);
    }

    /* Preview trigger hint */
    .preview-hint {
      position: absolute;
      bottom: 10px;
      left: 50%;
      transform: translateX(-50%);
      padding: 6px 12px;
      background: rgba(0, 0, 0, 0.7);
      border-radius: 20px;
      font-size: 11px;
      color: var(--text);
      opacity: 0;
      transition: opacity 0.2s ease;
      z-index: 5;
      pointer-events: none;
      backdrop-filter: blur(8px);
    }

    .card:hover .preview-hint { opacity: 1; }

    /* Empty State */
    .empty-state {
      grid-column: 1 / -1;
      text-align: center;
      padding: 60px 20px;
      color: var(--muted);
    }

    .empty-state .icon { font-size: 48px; margin-bottom: 16px; opacity: 0.5; }
    .empty-state .title { font-size: 18px; font-weight: 600; color: var(--text); margin-bottom: 8px; }
    .empty-state .desc { font-size: 14px; }

    /* Loading */
    .loading {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      padding: 40px;
      color: var(--muted);
    }

    .spinner {
      width: 20px;
      height: 20px;
      border: 2px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    /* Responsive */
    @media (max-width: 768px) {
      .app { padding: 20px 16px; }
      .header-text h1 { font-size: 22px; }
      .toolbar { padding: 12px; gap: 8px; }
      .input-group { width: 100%; }
      .toolbar input[type="text"] { flex: 1; min-width: 0; }
      .volume-control { margin-left: 0; width: 100%; justify-content: center; }
      .grid { grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 12px; }
      .thumb-wrap { height: 120px; }
    }
  </style>
</head>
<body>
  <div class="bg-effects"></div>
  <div id="app"></div>
  <script type="module">
    import { createApp, ref, computed, onMounted, onUnmounted } from 'https://unpkg.com/vue@3/dist/vue.esm-browser.js'

    const AUTO_REFRESH_INTERVAL = 15000
    const timeFormatter = new Intl.DateTimeFormat(undefined, {
      hour: "2-digit",
      minute: "2-digit",
      second: "2-digit",
    })

    const App = {
      setup() {
        const appState = ref(null)
        const lastRefreshTime = ref(null)
        const statusMessage = ref('')
        const statusType = ref('info')
        const scanRoot = ref('')
        const output = ref('')
        const volume = ref(100)
        const loading = ref(true)
        const previewItem = ref(null)
        let refreshTimer = null

        function setStatus(message, type = 'success') {
          statusMessage.value = message
          statusType.value = type
        }

        async function fetchText(url) {
          const res = await fetch(url)
          const text = await res.text()
          if (!res.ok) throw new Error(text || res.statusText)
          return text
        }

        async function fetchJson(url) {
          const res = await fetch(url)
          const text = await res.text()
          if (!res.ok) throw new Error(text || res.statusText)
          return JSON.parse(text)
        }

        const wallpaperCount = computed(() => appState.value?.items?.length || 0)
        const scanMetaText = computed(() => {
          const count = wallpaperCount.value
          return `${count} wallpaper${count === 1 ? "" : "s"}`
        })
        const updateTimeText = computed(() => {
          if (!lastRefreshTime.value) return "just now"
          return timeFormatter.format(lastRefreshTime.value)
        })

        async function loadList() {
          appState.value = await fetchJson("/api/list")
          lastRefreshTime.value = new Date()
          scanRoot.value = appState.value.root || ''
          output.value = appState.value.output || ''
        }

        async function refreshList({ quiet = false } = {}) {
          await fetchText("/api/refresh")
          await loadList()
          if (!quiet) setStatus("Directory rescan complete")
        }

        async function applyWallpaper(path) {
          try {
            setStatus("Applying wallpaper...", 'info')
            const message = await fetchText("/api/apply?path=" + encodeURIComponent(path))
            setStatus(message)
            await loadList()
          } catch (err) {
            setStatus(String(err), 'error')
          }
        }

        async function saveOutput() {
          const value = output.value.trim()
          if (!value) { setStatus("Output is required", 'error'); return }
          try {
            const message = await fetchText("/api/set_output?output=" + encodeURIComponent(value))
            setStatus(message)
            await loadList()
          } catch (err) { setStatus(String(err), 'error') }
        }

        async function saveRoot() {
          const value = scanRoot.value.trim()
          if (!value) { setStatus("Root directory is required", 'error'); return }
          try {
            const message = await fetchText("/api/set_root?root=" + encodeURIComponent(value))
            setStatus(message)
            await loadList()
          } catch (err) { setStatus(String(err), 'error') }
        }

        async function loadVolume() {
          try {
            const data = await fetchJson("/api/volume")
            volume.value = data.volume
          } catch (err) { console.error("Failed to load volume:", err) }
        }

        async function setVolume(vol) {
          try {
            await fetchText("/api/volume?volume=" + vol)
            volume.value = vol
          } catch (err) { setStatus(String(err), 'error') }
        }

        function onVolumeInput(e) { volume.value = parseInt(e.target.value) }
        function onVolumeChange(e) { setVolume(parseInt(e.target.value)) }
        function volUp() { const v = Math.min(500, volume.value + 25); volume.value = v; setVolume(v) }
        function volDown() { const v = Math.max(0, volume.value - 25); volume.value = v; setVolume(v) }

        function getKindClass(kind) {
          if (kind === "project") return "project"
          if (kind === "video") return "video"
          return "image"
        }

        function getKindLabel(kind) {
          if (kind === "project") return "Project"
          if (kind === "video") return "Video"
          return "Image"
        }

        function thumbUrl(thumb) {
          return "/api/file?path=" + encodeURIComponent(thumb)
        }

        function mediaUrl(path) {
          return "/api/file?path=" + encodeURIComponent(path)
        }

        function openPreview(item) {
          previewItem.value = item
        }

        function closePreview() {
          previewItem.value = null
        }

        function handleKeydown(e) {
          if (e.key === 'Escape' && previewItem.value) {
            closePreview()
          }
        }

        onMounted(async () => {
          try {
            await loadList()
            setStatus("Click a card to apply wallpaper, hover to preview", 'info')
          } catch (err) {
            setStatus(String(err), 'error')
          }
          loading.value = false
          await loadVolume()
          refreshTimer = setInterval(() => refreshList({ quiet: true }).catch(() => {}), AUTO_REFRESH_INTERVAL)
          document.addEventListener('keydown', handleKeydown)
        })

        onUnmounted(() => {
          if (refreshTimer) clearInterval(refreshTimer)
          document.removeEventListener('keydown', handleKeydown)
        })

        return {
          appState, statusMessage, statusType, scanRoot, output, volume, loading,
          wallpaperCount, scanMetaText, updateTimeText, previewItem,
          applyWallpaper, saveOutput, saveRoot, refreshList,
          onVolumeInput, onVolumeChange, volUp, volDown,
          getKindClass, getKindLabel, thumbUrl, mediaUrl,
          openPreview, closePreview,
        }
      },

      template: `
        <div class="app">
          <div class="header">
            <div class="logo">W</div>
            <div class="header-text">
              <h1>wall-set</h1>
              <div class="sub">{{ appState?.root || 'Loading...' }}</div>
            </div>
          </div>

          <div class="toolbar">
            <div class="input-group">
              <label>Root</label>
              <input v-model="scanRoot" type="text" placeholder="/path/to/wallpapers" />
              <button class="btn btn-accent" @click="saveRoot">Save</button>
            </div>
            <div class="separator"></div>
            <div class="input-group">
              <label>Output</label>
              <input v-model="output" type="text" placeholder="DP-3" />
              <button class="btn btn-accent" @click="saveOutput">Save</button>
            </div>
            <div class="separator"></div>
            <button class="btn" @click="refreshList"><span>↻</span> Rescan</button>
            <div class="volume-control">
              <span class="volume-icon">🔊</span>
              <button class="vol-btn" @click="volDown">−</button>
              <input type="range" class="volume-slider" min="0" max="500" :value="volume" @input="onVolumeInput" @change="onVolumeChange" />
              <button class="vol-btn" @click="volUp">+</button>
              <span class="volume-value">{{ volume }}%</span>
            </div>
          </div>

          <div class="stats-bar">
            <div class="stat-item">
              <div class="stat-icon">📁</div>
              <div class="stat-info">
                <div class="stat-value">{{ scanMetaText }}</div>
                <div class="stat-label">Total</div>
              </div>
            </div>
            <div class="stat-item">
              <div class="stat-icon">🕐</div>
              <div class="stat-info">
                <div class="stat-value">{{ updateTimeText }}</div>
                <div class="stat-label">Last Scan</div>
              </div>
            </div>
          </div>

          <div v-if="statusMessage" class="status-toast" :class="statusType">
            <span v-if="statusType === 'info'">ℹ️</span>
            <span v-else-if="statusType === 'success'">✅</span>
            <span v-else>⚠️</span>
            {{ statusMessage }}
          </div>

          <div v-if="loading" class="loading">
            <div class="spinner"></div>
            <span>Loading wallpapers...</span>
          </div>

          <div v-else class="grid">
            <div v-if="!appState?.items?.length" class="empty-state">
              <div class="icon">🖼️</div>
              <div class="title">No wallpapers found</div>
              <div class="desc">Try changing the scan root directory</div>
            </div>

            <button
              v-for="item in appState?.items || []"
              :key="item.path"
              class="card"
              :class="{ selected: appState?.last === item.path }"
              @click="applyWallpaper(item.path)"
              @mouseenter="openPreview(item)"
            >
              <div class="thumb-wrap">
                <img v-if="item.thumb" class="thumb" loading="lazy" :src="thumbUrl(item.thumb)" :alt="item.name" />
                <div v-else class="video-placeholder">
                  <span class="icon">{{ item.kind === 'video' ? '▶' : '🎮' }}</span>
                  <span class="label">{{ getKindLabel(item.kind) }}</span>
                </div>
                <span class="kind-badge" :class="getKindClass(item.kind)">{{ getKindLabel(item.kind) }}</span>
              </div>
              <div class="meta">
                <div class="name">{{ item.name }}</div>
                <div class="path">{{ item.path }}</div>
              </div>
              <div class="preview-hint">Hover to preview</div>
            </button>
          </div>
        </div>

        <!-- Preview Modal -->
        <div v-if="previewItem" class="preview-overlay" @click.self="closePreview">
          <div class="preview-content">
            <button class="preview-close" @click="closePreview">✕</button>
            <img
              v-if="previewItem.kind === 'image'"
              :src="mediaUrl(previewItem.path)"
              :alt="previewItem.name"
            />
            <video
              v-else-if="previewItem.kind === 'video'"
              :src="mediaUrl(previewItem.path)"
              autoplay
              loop
              muted
              playsinline
            />
            <div v-else class="video-placeholder" style="width: 500px; height: 300px; border-radius: 16px;">
              <span class="icon">🎮</span>
              <span class="label">{{ previewItem.name }}</span>
            </div>
            <div class="preview-info">
              <div class="name">{{ previewItem.name }}</div>
              <div class="path">{{ previewItem.path }}</div>
            </div>
          </div>
        </div>
      `
    }

    createApp(App).mount('#app')
  </script>
</body>
</html>
