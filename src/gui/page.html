<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>wall-set</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #0a0e14;
      --panel: rgba(20, 27, 38, 0.85);
      --panel-solid: #141b26;
      --text: #e6edf3;
      --muted: #7d8590;
      --accent: #3fb950;
      --accent-glow: rgba(63, 185, 80, 0.4);
      --accent-soft: rgba(63, 185, 80, 0.15);
      --border: rgba(255, 255, 255, 0.08);
      --border-hover: rgba(255, 255, 255, 0.15);
      --danger: #f85149;
      --danger-soft: rgba(248, 81, 73, 0.15);
      --blue: #58a6ff;
      --purple: #bc8cff;
      --radius: 16px;
      --radius-sm: 10px;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      background: var(--bg);
      color: var(--text);
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      overflow-x: hidden;
    }

    .bg-effects {
      position: fixed;
      inset: 0;
      z-index: 0;
      pointer-events: none;
      overflow: hidden;
    }

    .bg-effects::before {
      content: '';
      position: absolute;
      width: 600px;
      height: 600px;
      top: -200px;
      left: -100px;
      background: radial-gradient(circle, rgba(63, 185, 80, 0.12) 0%, transparent 70%);
      animation: float 20s ease-in-out infinite;
    }

    .bg-effects::after {
      content: '';
      position: absolute;
      width: 500px;
      height: 500px;
      bottom: -150px;
      right: -100px;
      background: radial-gradient(circle, rgba(88, 166, 255, 0.1) 0%, transparent 70%);
      animation: float 25s ease-in-out infinite reverse;
    }

    @keyframes float {
      0%, 100% { transform: translate(0, 0) scale(1); }
      33% { transform: translate(30px, -30px) scale(1.05); }
      66% { transform: translate(-20px, 20px) scale(0.95); }
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @keyframes slideUp {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .app {
      position: relative;
      z-index: 1;
      max-width: 1400px;
      margin: 0 auto;
      padding: 32px 24px;
    }

    /* Header */
    .header {
      display: flex;
      align-items: center;
      gap: 16px;
      margin-bottom: 28px;
      animation: fadeIn 0.5s ease;
    }

    .logo {
      width: 48px;
      height: 48px;
      background: linear-gradient(135deg, var(--accent), var(--blue));
      border-radius: 14px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 24px;
      font-weight: 700;
      box-shadow: 0 4px 20px var(--accent-glow);
    }

    .header-text h1 {
      font-size: 28px;
      font-weight: 700;
      letter-spacing: -0.5px;
      background: linear-gradient(135deg, var(--text), var(--muted));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .header-text .sub {
      color: var(--muted);
      font-size: 13px;
      margin-top: 2px;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .header-text .sub::before {
      content: '';
      width: 6px;
      height: 6px;
      background: var(--accent);
      border-radius: 50%;
      box-shadow: 0 0 8px var(--accent-glow);
    }

    /* Toolbar */
    .toolbar {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      align-items: center;
      padding: 16px 20px;
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      animation: fadeIn 0.5s ease 0.1s both;
    }

    .input-group {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .input-group label {
      color: var(--muted);
      font-size: 12px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .toolbar input[type="text"] {
      background: rgba(0, 0, 0, 0.3);
      color: var(--text);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      padding: 10px 14px;
      font-size: 13px;
      font-family: inherit;
      min-width: 180px;
      transition: all 0.2s ease;
    }

    .toolbar input[type="text"]:focus {
      outline: none;
      border-color: var(--accent);
      box-shadow: 0 0 0 3px var(--accent-soft);
    }

    .toolbar input[type="text"]::placeholder {
      color: var(--muted);
      opacity: 0.6;
    }

    .btn {
      background: var(--panel-solid);
      color: var(--text);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      padding: 10px 16px;
      font-size: 13px;
      font-weight: 500;
      font-family: inherit;
      cursor: pointer;
      transition: all 0.2s ease;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .btn:hover {
      border-color: var(--border-hover);
      background: rgba(255, 255, 255, 0.05);
      transform: translateY(-1px);
    }

    .btn:active { transform: translateY(0); }

    .btn-accent {
      background: var(--accent-soft);
      border-color: rgba(63, 185, 80, 0.3);
      color: var(--accent);
    }

    .btn-accent:hover {
      background: rgba(63, 185, 80, 0.25);
      border-color: var(--accent);
      box-shadow: 0 0 16px var(--accent-soft);
    }

    .separator {
      width: 1px;
      height: 24px;
      background: var(--border);
      margin: 0 4px;
    }

    /* Volume Control */
    .volume-control {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-left: auto;
      padding: 6px 12px;
      background: rgba(0, 0, 0, 0.2);
      border-radius: var(--radius-sm);
    }

    .volume-icon { color: var(--muted); font-size: 16px; }

    .volume-slider {
      -webkit-appearance: none;
      appearance: none;
      width: 100px;
      height: 4px;
      background: var(--border);
      border-radius: 2px;
      outline: none;
      cursor: pointer;
    }

    .volume-slider::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 14px;
      height: 14px;
      background: var(--accent);
      border-radius: 50%;
      cursor: pointer;
      box-shadow: 0 0 8px var(--accent-glow);
      transition: transform 0.15s ease;
    }

    .volume-slider::-webkit-slider-thumb:hover { transform: scale(1.2); }

    .volume-slider::-moz-range-thumb {
      width: 14px;
      height: 14px;
      background: var(--accent);
      border-radius: 50%;
      cursor: pointer;
      border: none;
      box-shadow: 0 0 8px var(--accent-glow);
    }

    .volume-value {
      color: var(--text);
      font-size: 12px;
      font-weight: 600;
      min-width: 40px;
      text-align: right;
      font-variant-numeric: tabular-nums;
    }

    .vol-btn {
      width: 26px;
      height: 26px;
      background: rgba(255, 255, 255, 0.05);
      color: var(--muted);
      border: 1px solid var(--border);
      border-radius: 8px;
      cursor: pointer;
      font-size: 14px;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.15s ease;
    }

    .vol-btn:hover {
      color: var(--text);
      border-color: var(--border-hover);
      background: rgba(255, 255, 255, 0.1);
    }

    /* Stats Bar */
    .stats-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-top: 20px;
      padding: 14px 20px;
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      animation: fadeIn 0.5s ease 0.2s both;
    }

    .stat-item { display: flex; align-items: center; gap: 8px; }

    .stat-icon {
      width: 32px;
      height: 32px;
      background: var(--accent-soft);
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 14px;
    }

    .stat-info .stat-value { font-size: 16px; font-weight: 700; color: var(--text); }
    .stat-info .stat-label {
      font-size: 11px;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    /* Status Toast */
    .status-toast {
      margin-top: 16px;
      padding: 12px 16px;
      border-radius: var(--radius-sm);
      font-size: 13px;
      font-weight: 500;
      display: flex;
      align-items: center;
      gap: 8px;
      animation: slideUp 0.3s ease;
      transition: all 0.3s ease;
    }

    .status-toast.success {
      background: var(--accent-soft);
      border: 1px solid rgba(63, 185, 80, 0.3);
      color: var(--accent);
    }

    .status-toast.error {
      background: var(--danger-soft);
      border: 1px solid rgba(248, 81, 73, 0.3);
      color: var(--danger);
    }

    .status-toast.info {
      background: rgba(88, 166, 255, 0.1);
      border: 1px solid rgba(88, 166, 255, 0.3);
      color: var(--blue);
    }

    /* Grid */
    .content-shell {
      margin-top: 20px;
    }

    .library-panel,
    .detail-panel,
    .settings-drawer {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
    }

    .library-panel {
      padding: 18px;
      animation: fadeIn 0.5s ease 0.3s both;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
      gap: 16px;
    }

    .drawer-backdrop {
      position: fixed;
      inset: 0;
      z-index: 150;
      background: rgba(4, 8, 12, 0.58);
      backdrop-filter: blur(6px);
      -webkit-backdrop-filter: blur(6px);
      animation: fadeIn 0.2s ease;
    }

    .settings-drawer {
      position: fixed;
      top: 18px;
      right: 18px;
      bottom: 18px;
      width: min(420px, calc(100vw - 28px));
      z-index: 160;
      padding: 18px;
      overflow-y: auto;
      box-shadow: 0 24px 64px rgba(0, 0, 0, 0.45);
      animation: drawerIn 0.24s ease;
    }

    @keyframes drawerIn {
      from { opacity: 0; transform: translateX(28px); }
      to { opacity: 1; transform: translateX(0); }
    }

    /* Card */
    .card {
      all: unset;
      display: block;
      cursor: pointer;
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      position: relative;
    }

    .card::before {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(180deg, transparent 50%, rgba(0, 0, 0, 0.4) 100%);
      opacity: 0;
      transition: opacity 0.3s ease;
      z-index: 1;
      pointer-events: none;
    }

    .card:hover {
      border-color: var(--accent);
      transform: translateY(-6px);
      box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4), 0 0 0 1px var(--accent-soft);
    }

    .card:hover::before { opacity: 1; }

    .card.selected {
      border-color: var(--accent);
      box-shadow: 0 0 0 2px var(--accent), 0 20px 40px rgba(0, 0, 0, 0.3);
    }

    .card.active:not(.selected)::after {
      content: 'Live';
      position: absolute;
      top: 12px;
      left: 12px;
      padding: 4px 8px;
      border-radius: 999px;
      background: rgba(63, 185, 80, 0.18);
      border: 1px solid rgba(63, 185, 80, 0.3);
      color: var(--accent);
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.4px;
      text-transform: uppercase;
      z-index: 10;
    }

    .card.selected::after {
      content: '✓';
      position: absolute;
      top: 12px;
      left: 12px;
      width: 28px;
      height: 28px;
      background: var(--accent);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 14px;
      font-weight: 700;
      color: #000;
      z-index: 10;
      box-shadow: 0 4px 12px var(--accent-glow);
      animation: scaleIn 0.2s ease;
    }

    @keyframes scaleIn {
      from { transform: scale(0); }
      to { transform: scale(1); }
    }

    .thumb-wrap {
      position: relative;
      width: 100%;
      height: 150px;
      overflow: hidden;
      background: rgba(0, 0, 0, 0.3);
    }

    .thumb {
      width: 100%;
      height: 100%;
      object-fit: cover;
      transition: transform 0.4s ease, filter 0.25s ease;
    }

    .card:hover .thumb { transform: scale(1.08); }

    .privacy-blurred {
      filter: blur(18px) saturate(0.9);
      transform: scale(1.08);
    }

    .privacy-soften {
      filter: blur(16px) saturate(0.92);
      transform: scale(1.03);
      transition: filter 0.25s ease, transform 0.25s ease;
    }

    .kind-badge {
      position: absolute;
      top: 10px;
      right: 10px;
      padding: 4px 10px;
      border-radius: 20px;
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 0.5px;
      text-transform: uppercase;
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      z-index: 2;
    }

    .kind-badge.image {
      background: rgba(63, 185, 80, 0.2);
      color: var(--accent);
      border: 1px solid rgba(63, 185, 80, 0.3);
    }

    .kind-badge.video {
      background: rgba(88, 166, 255, 0.2);
      color: var(--blue);
      border: 1px solid rgba(88, 166, 255, 0.3);
    }

    .kind-badge.project {
      background: rgba(188, 140, 255, 0.2);
      color: var(--purple);
      border: 1px solid rgba(188, 140, 255, 0.3);
    }

    .video-placeholder {
      width: 100%;
      height: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 8px;
      background: linear-gradient(135deg, rgba(88, 166, 255, 0.1), rgba(188, 140, 255, 0.1));
    }

    .video-placeholder .icon { font-size: 32px; opacity: 0.6; }
    .video-placeholder .label {
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: var(--muted);
    }

    .thumb-privacy-toggle {
      position: absolute;
      left: 10px;
      bottom: 10px;
      z-index: 3;
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 6px 10px;
      border-radius: 999px;
      background: rgba(9, 13, 18, 0.74);
      border: 1px solid rgba(255, 255, 255, 0.1);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      color: var(--text);
      cursor: pointer;
      user-select: none;
      transition: border-color 0.2s ease, background 0.2s ease;
    }

    .thumb-privacy-toggle:hover {
      border-color: rgba(255, 255, 255, 0.18);
      background: rgba(12, 18, 24, 0.88);
    }

    .thumb-privacy-toggle input {
      position: absolute;
      opacity: 0;
      pointer-events: none;
    }

    .thumb-privacy-toggle .mini-track {
      position: relative;
      width: 34px;
      height: 20px;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.14);
      border: 1px solid rgba(255, 255, 255, 0.08);
      transition: all 0.2s ease;
    }

    .thumb-privacy-toggle .mini-track::after {
      content: '';
      position: absolute;
      top: 2px;
      left: 2px;
      width: 14px;
      height: 14px;
      border-radius: 50%;
      background: #fff;
      transition: transform 0.2s ease, background 0.2s ease;
    }

    .thumb-privacy-toggle input:checked + .mini-track {
      background: rgba(88, 166, 255, 0.18);
      border-color: rgba(88, 166, 255, 0.35);
    }

    .thumb-privacy-toggle input:checked + .mini-track::after {
      transform: translateX(14px);
      background: var(--blue);
    }

    .thumb-privacy-toggle .mini-label {
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.4px;
      text-transform: uppercase;
    }

    .meta { padding: 14px; }

    .meta .name {
      font-size: 14px;
      font-weight: 600;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      color: var(--text);
    }

    .meta .path {
      font-size: 11px;
      color: var(--muted);
      margin-top: 6px;
      overflow: hidden;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      word-break: break-all;
      line-height: 1.4;
    }

    .detail-content {
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .detail-header {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 12px;
    }

    .detail-title {
      font-size: 18px;
      font-weight: 700;
      color: var(--text);
    }

    .drawer-close {
      width: 36px;
      height: 36px;
      padding: 0;
      justify-content: center;
      border-radius: 999px;
      font-size: 20px;
      line-height: 1;
      flex: none;
    }

    .detail-sub,
    .detail-path {
      font-size: 12px;
      color: var(--muted);
      line-height: 1.5;
      word-break: break-all;
    }

    .selected-preview {
      overflow: hidden;
      border-radius: var(--radius-sm);
      border: 1px solid var(--border);
      background: rgba(0, 0, 0, 0.25);
      min-height: 180px;
    }

    .selected-preview img {
      display: block;
      width: 100%;
      max-height: 260px;
      object-fit: cover;
      transition: filter 0.25s ease, transform 0.25s ease;
    }

    .selected-preview-fallback {
      min-height: 180px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 10px;
      color: var(--muted);
      background: linear-gradient(135deg, rgba(188, 140, 255, 0.18), rgba(88, 166, 255, 0.14));
    }

    .selected-preview-fallback .icon {
      font-size: 34px;
      color: var(--text);
    }

    .property-placeholder {
      padding: 16px;
      border-radius: var(--radius-sm);
      border: 1px dashed var(--border);
      color: var(--muted);
      background: rgba(255, 255, 255, 0.03);
      line-height: 1.5;
    }

    .property-placeholder.error {
      color: var(--danger);
      border-color: rgba(248, 81, 73, 0.28);
      background: var(--danger-soft);
    }

    .property-list {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .property-card {
      padding: 14px;
      border-radius: var(--radius-sm);
      border: 1px solid var(--border);
      background: rgba(255, 255, 255, 0.03);
    }

    .property-top {
      display: flex;
      justify-content: space-between;
      gap: 10px;
      margin-bottom: 10px;
    }

    .property-label {
      font-size: 13px;
      font-weight: 600;
      color: var(--text);
    }

    .property-kind {
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.6px;
      color: var(--blue);
    }

    .property-control input[type="text"],
    .property-control select {
      width: 100%;
      background: rgba(0, 0, 0, 0.28);
      color: var(--text);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 10px 12px;
      font-size: 13px;
      font-family: inherit;
    }

    .property-control input[type="text"]:focus,
    .property-control select:focus {
      outline: none;
      border-color: var(--accent);
      box-shadow: 0 0 0 3px var(--accent-soft);
    }

    .text-control,
    .color-control {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .text-control .btn {
      flex: none;
    }

    .slider-control input[type="range"] {
      width: 100%;
    }

    .slider-meta {
      margin-top: 8px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      color: var(--muted);
      font-size: 11px;
    }

    .slider-meta strong {
      color: var(--text);
      font-size: 13px;
    }

    .color-control input[type="color"] {
      width: 56px;
      height: 40px;
      padding: 4px;
      background: rgba(0, 0, 0, 0.28);
      border: 1px solid var(--border);
      border-radius: 10px;
    }

    .color-control code {
      color: var(--muted);
      font-size: 12px;
    }

    .toggle {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      cursor: pointer;
    }

    .toggle input {
      position: absolute;
      opacity: 0;
      pointer-events: none;
    }

    .toggle-track {
      position: relative;
      width: 46px;
      height: 26px;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.12);
      border: 1px solid var(--border);
      transition: all 0.2s ease;
    }

    .toggle-track::after {
      content: '';
      position: absolute;
      top: 2px;
      left: 2px;
      width: 20px;
      height: 20px;
      border-radius: 50%;
      background: #fff;
      transition: transform 0.2s ease;
    }

    .toggle input:checked + .toggle-track {
      background: var(--accent-soft);
      border-color: rgba(63, 185, 80, 0.4);
    }

    .toggle input:checked + .toggle-track::after {
      transform: translateX(20px);
      background: var(--accent);
    }

    .toggle-text {
      color: var(--text);
      font-size: 13px;
      font-weight: 600;
    }

    /* Floating Preview */
    .floating-preview {
      position: fixed;
      z-index: 100;
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.2s ease;
      filter: drop-shadow(0 20px 40px rgba(0, 0, 0, 0.5));
    }

    .floating-preview.visible {
      opacity: 1;
    }

    .floating-preview img {
      max-width: 400px;
      max-height: 300px;
      border-radius: var(--radius);
      border: 2px solid var(--border);
      object-fit: contain;
      background: var(--panel-solid);
      transition: filter 0.25s ease, transform 0.25s ease;
    }

    .floating-preview video {
      max-width: 400px;
      max-height: 300px;
      border-radius: var(--radius);
      border: 2px solid var(--border);
      background: #000;
      transition: filter 0.25s ease, transform 0.25s ease;
    }

    .floating-preview .project-preview {
      width: 300px;
      height: 200px;
      border-radius: var(--radius);
      border: 2px solid var(--border);
      background: linear-gradient(135deg, rgba(188, 140, 255, 0.2), rgba(88, 166, 255, 0.2));
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }

    .floating-preview .project-preview .icon { font-size: 48px; }
    .floating-preview .project-preview .name {
      font-size: 14px;
      font-weight: 600;
      color: var(--text);
      max-width: 90%;
      text-align: center;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    /* Empty State */
    .empty-state {
      grid-column: 1 / -1;
      text-align: center;
      padding: 60px 20px;
      color: var(--muted);
    }

    .empty-state .icon { font-size: 48px; margin-bottom: 16px; opacity: 0.5; }
    .empty-state .title { font-size: 18px; font-weight: 600; color: var(--text); margin-bottom: 8px; }
    .empty-state .desc { font-size: 14px; }

    /* Loading */
    .loading {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      padding: 40px;
      color: var(--muted);
    }

    .spinner {
      width: 20px;
      height: 20px;
      border: 2px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    /* Responsive */
    @media (max-width: 768px) {
      .app { padding: 20px 16px; }
      .header-text h1 { font-size: 22px; }
      .toolbar { padding: 12px; gap: 8px; }
      .input-group { width: 100%; }
      .toolbar input[type="text"] { flex: 1; min-width: 0; }
      .volume-control { margin-left: 0; width: 100%; justify-content: center; }
      .grid { grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 12px; }
      .thumb-wrap { height: 120px; }
      .settings-drawer {
        top: 10px;
        right: 10px;
        left: 10px;
        bottom: 10px;
        width: auto;
      }
      .detail-header { flex-direction: column; align-items: stretch; }
      .text-control, .color-control { flex-direction: column; align-items: stretch; }
      .floating-preview { display: none; }
    }
  </style>
</head>
<body>
  <div class="bg-effects"></div>
  <div id="app"></div>
  <script type="module">
    import { createApp, ref, computed, onMounted, onUnmounted, nextTick } from 'https://unpkg.com/vue@3/dist/vue.esm-browser.js'

    const AUTO_REFRESH_INTERVAL = 15000
    const PRIVACY_BLUR_STORAGE_KEY = 'wall-set-privacy-blur'
    const timeFormatter = new Intl.DateTimeFormat(undefined, {
      hour: "2-digit",
      minute: "2-digit",
      second: "2-digit",
    })

    const App = {
      setup() {
        const appState = ref(null)
        const lastRefreshTime = ref(null)
        const statusMessage = ref('')
        const statusType = ref('info')
        const scanRoot = ref('')
        const output = ref('')
        const volume = ref(100)
        const loading = ref(true)
        const previewItem = ref(null)
        const previewPos = ref({ x: 0, y: 0 })
        const blurredPaths = ref({})
        const selectedPath = ref('')
        const settingsOpen = ref(false)
        const propertyState = ref({
          path: '',
          projectDir: '',
          kind: '',
          properties: [],
          loading: false,
          error: '',
        })
        const propertyDrafts = ref({})
        let refreshTimer = null

        function setStatus(message, type = 'success') {
          statusMessage.value = message
          statusType.value = type
        }

        async function fetchText(url) {
          const res = await fetch(url)
          const text = await res.text()
          if (!res.ok) throw new Error(text || res.statusText)
          return text
        }

        async function fetchJson(url) {
          const res = await fetch(url)
          const text = await res.text()
          if (!res.ok) throw new Error(text || res.statusText)
          return JSON.parse(text)
        }

        const wallpaperCount = computed(() => appState.value?.items?.length || 0)
        const scanMetaText = computed(() => {
          const count = wallpaperCount.value
          return `${count} wallpaper${count === 1 ? "" : "s"}`
        })
        const updateTimeText = computed(() => {
          if (!lastRefreshTime.value) return "just now"
          return timeFormatter.format(lastRefreshTime.value)
        })

        const selectedItem = computed(() => {
          const items = appState.value?.items || []
          return items.find(item => item.path === selectedPath.value) || null
        })

        const selectedSettingsCount = computed(() => propertyState.value.properties?.length || 0)
        const selectedItemBlurred = computed(() => isBlurred(selectedPath.value))

        function loadBlurredPaths() {
          try {
            const raw = localStorage.getItem(PRIVACY_BLUR_STORAGE_KEY)
            if (!raw) return
            const parsed = JSON.parse(raw)
            if (parsed && typeof parsed === 'object') {
              blurredPaths.value = parsed
            }
          } catch (err) {
            console.warn("Failed to load privacy blur settings:", err)
          }
        }

        function saveBlurredPaths() {
          try {
            localStorage.setItem(PRIVACY_BLUR_STORAGE_KEY, JSON.stringify(blurredPaths.value))
          } catch (err) {
            console.warn("Failed to save privacy blur settings:", err)
          }
        }

        function isBlurred(path) {
          return !!(path && blurredPaths.value[path])
        }

        function toggleBlur(path, forceValue) {
          if (!path) return
          const next = { ...blurredPaths.value }
          const enabled = typeof forceValue === 'boolean' ? forceValue : !next[path]
          if (enabled) next[path] = true
          else delete next[path]
          blurredPaths.value = next
          saveBlurredPaths()
        }

        function setPropertyState(next) {
          propertyState.value = {
            path: '',
            projectDir: '',
            kind: '',
            properties: [],
            loading: false,
            error: '',
            ...next,
          }
        }

        function hydratePropertyDrafts(properties) {
          const next = {}
          for (const prop of properties || []) {
            next[prop.key] = uiValueFromProperty(prop)
          }
          propertyDrafts.value = next
        }

        function ensureSelection() {
          const items = appState.value?.items || []
          if (!items.length) {
            selectedPath.value = ''
            settingsOpen.value = false
            setPropertyState({})
            return
          }
          if (selectedPath.value && items.some(item => item.path === selectedPath.value)) {
            return
          }
          if (appState.value?.last && items.some(item => item.path === appState.value.last)) {
            selectedPath.value = appState.value.last
            return
          }
          selectedPath.value = items[0].path
        }

        async function loadList() {
          appState.value = await fetchJson("/api/list")
          lastRefreshTime.value = new Date()
          scanRoot.value = appState.value.root || ''
          output.value = appState.value.output || ''
          ensureSelection()
          if (selectedPath.value) {
            await loadProperties(selectedPath.value)
          }
        }

        async function refreshList({ quiet = false } = {}) {
          await fetchText("/api/refresh")
          await loadList()
          if (!quiet) setStatus("Directory rescan complete")
        }

        async function applyWallpaper(path) {
          try {
            setStatus("Applying wallpaper...", 'info')
            const message = await fetchText("/api/apply?path=" + encodeURIComponent(path))
            setStatus(message)
            await loadList()
          } catch (err) {
            setStatus(String(err), 'error')
          }
        }

        async function saveOutput() {
          const value = output.value.trim()
          if (!value) { setStatus("Output is required", 'error'); return }
          try {
            const message = await fetchText("/api/set_output?output=" + encodeURIComponent(value))
            setStatus(message)
            await loadList()
          } catch (err) { setStatus(String(err), 'error') }
        }

        async function saveRoot() {
          const value = scanRoot.value.trim()
          if (!value) { setStatus("Root directory is required", 'error'); return }
          try {
            const message = await fetchText("/api/set_root?root=" + encodeURIComponent(value))
            setStatus(message)
            await loadList()
          } catch (err) { setStatus(String(err), 'error') }
        }

        async function loadVolume() {
          try {
            const data = await fetchJson("/api/volume")
            volume.value = data.volume
          } catch (err) { console.error("Failed to load volume:", err) }
        }

        async function setVolume(vol) {
          try {
            await fetchText("/api/volume?volume=" + vol)
            volume.value = vol
          } catch (err) { setStatus(String(err), 'error') }
        }

        function onVolumeInput(e) { volume.value = parseInt(e.target.value) }
        function onVolumeChange(e) { setVolume(parseInt(e.target.value)) }
        function volUp() { const v = Math.min(500, volume.value + 25); volume.value = v; setVolume(v) }
        function volDown() { const v = Math.max(0, volume.value - 25); volume.value = v; setVolume(v) }

        function getKindClass(kind) {
          if (kind === "project") return "project"
          if (kind === "video") return "video"
          return "image"
        }

        function getKindLabel(kind) {
          if (kind === "project") return "Project"
          if (kind === "video") return "Video"
          return "Image"
        }

        function thumbUrl(thumb) {
          return "/api/file?path=" + encodeURIComponent(thumb)
        }

        function mediaUrl(path) {
          return "/api/file?path=" + encodeURIComponent(path)
        }

        async function selectWallpaper(path) {
          selectedPath.value = path
          settingsOpen.value = true
          await loadProperties(path)
        }

        function closeSettings() {
          settingsOpen.value = false
        }

        async function applySelectedWallpaper() {
          if (!selectedItem.value) {
            setStatus("No wallpaper selected", 'error')
            return
          }
          await applyWallpaper(selectedItem.value.path)
        }

        async function loadProperties(path) {
          const item = (appState.value?.items || []).find(entry => entry.path === path)
          if (!item) {
            setPropertyState({})
            return
          }
          if (item.kind !== "project") {
            setPropertyState({
              path,
              kind: item.kind,
              properties: [],
              error: '',
            })
            propertyDrafts.value = {}
            return
          }
          setPropertyState({
            path,
            kind: item.kind,
            properties: propertyState.value.path === path ? propertyState.value.properties : [],
            loading: true,
            error: '',
          })
          try {
            const data = await fetchJson("/api/properties?path=" + encodeURIComponent(path))
            setPropertyState({
              ...data,
              loading: false,
              error: '',
            })
            hydratePropertyDrafts(data.properties)
          } catch (err) {
            setPropertyState({
              path,
              kind: item.kind,
              properties: [],
              loading: false,
              error: String(err),
            })
            propertyDrafts.value = {}
          }
        }

        function uiValueFromProperty(prop) {
          if (prop.kind === "color") return rgbFloatsToHex(prop.value)
          return prop.value
        }

        function sliderMin(prop) { return prop.min ?? "0" }
        function sliderMax(prop) { return prop.max ?? "100" }
        function sliderStep(prop) { return prop.step ?? "1" }

        function rgbFloatsToHex(raw) {
          const parts = String(raw).split(',').map(item => Number.parseFloat(item.trim()))
          if (parts.length < 3 || parts.some(num => Number.isNaN(num))) return "#ffffff"
          const toHex = (num) => Math.max(0, Math.min(255, Math.round(num * 255))).toString(16).padStart(2, '0')
          return "#" + parts.slice(0, 3).map(toHex).join('')
        }

        function hexToRgbFloats(hex) {
          const match = String(hex).trim().match(/^#?([0-9a-f]{6})$/i)
          if (!match) return "1.000000, 1.000000, 1.000000"
          const raw = match[1]
          const values = [0, 2, 4].map((index) => parseInt(raw.slice(index, index + 2), 16) / 255)
          return values.map(value => value.toFixed(6)).join(", ")
        }

        function propertyValueForEngine(prop) {
          const current = propertyDrafts.value[prop.key] ?? ''
          if (prop.kind === "color") return hexToRgbFloats(current)
          if (prop.kind === "boolean") return current === "1" ? "1" : "0"
          return String(current)
        }

        async function saveProjectProperty(prop) {
          if (!selectedItem.value) return
          try {
            setStatus(`Saving ${prop.label}...`, 'info')
            const query = new URLSearchParams({
              path: selectedItem.value.path,
              key: prop.key,
              value: propertyValueForEngine(prop),
            })
            const data = await fetchJson("/api/set_property?" + query.toString())
            setPropertyState({
              ...data,
              loading: false,
              error: '',
            })
            hydratePropertyDrafts(data.properties)
            setStatus(`${prop.label} updated`)
          } catch (err) {
            setStatus(String(err), 'error')
          }
        }

        function setBooleanProperty(prop, checked) {
          propertyDrafts.value[prop.key] = checked ? "1" : "0"
          saveProjectProperty(prop)
        }

        function selectedPreviewThumb() {
          if (!selectedItem.value) return null
          if (selectedItem.value.thumb) return thumbUrl(selectedItem.value.thumb)
          if (selectedItem.value.kind === "image") return mediaUrl(selectedItem.value.path)
          return null
        }

        function showPreview(item, event) {
          previewItem.value = item
          updatePreviewPos(event)
        }

        function hidePreview() {
          previewItem.value = null
        }

        function toggleItemBlur(item, event) {
          event?.stopPropagation()
          toggleBlur(item?.path, !isBlurred(item?.path))
        }

        function updatePreviewPos(event) {
          const x = event.clientX + 20
          const y = event.clientY + 20
          const maxX = window.innerWidth - 420
          const maxY = window.innerHeight - 320
          previewPos.value = {
            x: Math.min(x, maxX),
            y: Math.min(y, maxY)
          }
        }

        function onMouseMove(event) {
          if (previewItem.value) {
            updatePreviewPos(event)
          }
        }

        onMounted(async () => {
          loadBlurredPaths()
          try {
            await loadList()
            setStatus("Click a wallpaper card to open its settings panel", 'info')
          } catch (err) {
            setStatus(String(err), 'error')
          }
          loading.value = false
          await loadVolume()
          refreshTimer = setInterval(() => refreshList({ quiet: true }).catch(() => {}), AUTO_REFRESH_INTERVAL)
          document.addEventListener('mousemove', onMouseMove)
        })

        onUnmounted(() => {
          if (refreshTimer) clearInterval(refreshTimer)
          document.removeEventListener('mousemove', onMouseMove)
        })

        return {
          appState, statusMessage, statusType, scanRoot, output, volume, loading,
          wallpaperCount, scanMetaText, updateTimeText, previewItem, previewPos,
          selectedPath, selectedItem, propertyState, propertyDrafts, selectedSettingsCount,
          blurredPaths, selectedItemBlurred,
          settingsOpen,
          applyWallpaper, applySelectedWallpaper, saveOutput, saveRoot, refreshList,
          onVolumeInput, onVolumeChange, volUp, volDown,
          getKindClass, getKindLabel, thumbUrl, mediaUrl,
          showPreview, hidePreview, selectWallpaper, closeSettings, saveProjectProperty,
          sliderMin, sliderMax, sliderStep, setBooleanProperty, selectedPreviewThumb,
          isBlurred, toggleItemBlur,
        }
      },

      template: `
        <div class="app">
          <div class="header">
            <div class="logo">W</div>
            <div class="header-text">
              <h1>wall-set</h1>
              <div class="sub">{{ appState?.root || 'Loading...' }}</div>
            </div>
          </div>

          <div class="toolbar">
            <div class="input-group">
              <label>Root</label>
              <input v-model="scanRoot" type="text" placeholder="/path/to/wallpapers" />
              <button class="btn btn-accent" @click="saveRoot">Save</button>
            </div>
            <div class="separator"></div>
            <div class="input-group">
              <label>Output</label>
              <input v-model="output" type="text" placeholder="DP-3" />
              <button class="btn btn-accent" @click="saveOutput">Save</button>
            </div>
            <div class="separator"></div>
            <button class="btn" @click="refreshList"><span>↻</span> Rescan</button>
            <div class="volume-control">
              <span class="volume-icon">🔊</span>
              <button class="vol-btn" @click="volDown">−</button>
              <input type="range" class="volume-slider" min="0" max="500" :value="volume" @input="onVolumeInput" @change="onVolumeChange" />
              <button class="vol-btn" @click="volUp">+</button>
              <span class="volume-value">{{ volume }}%</span>
            </div>
          </div>

          <div class="stats-bar">
            <div class="stat-item">
              <div class="stat-icon">📁</div>
              <div class="stat-info">
                <div class="stat-value">{{ scanMetaText }}</div>
                <div class="stat-label">Total</div>
              </div>
            </div>
            <div class="stat-item">
              <div class="stat-icon">🕐</div>
              <div class="stat-info">
                <div class="stat-value">{{ updateTimeText }}</div>
                <div class="stat-label">Last Scan</div>
              </div>
            </div>
          </div>

          <div v-if="statusMessage" class="status-toast" :class="statusType">
            <span v-if="statusType === 'info'">ℹ️</span>
            <span v-else-if="statusType === 'success'">✅</span>
            <span v-else>⚠️</span>
            {{ statusMessage }}
          </div>

          <div v-if="loading" class="loading">
            <div class="spinner"></div>
            <span>Loading wallpapers...</span>
          </div>

          <div v-else class="content-shell">
            <section class="library-panel">
              <div v-if="!appState?.items?.length" class="empty-state">
                <div class="icon">🖼️</div>
                <div class="title">No wallpapers found</div>
                <div class="desc">Try changing the scan root directory</div>
              </div>

              <div v-else class="grid">
                <article
                  v-for="item in appState?.items || []"
                  :key="item.path"
                  class="card"
                  :class="{ selected: selectedPath === item.path, active: appState?.last === item.path }"
                  tabindex="0"
                  @click="selectWallpaper(item.path)"
                  @mouseenter="showPreview(item, $event)"
                  @mouseleave="hidePreview"
                >
                  <div class="thumb-wrap">
                    <img
                      v-if="item.thumb"
                      class="thumb"
                      :class="{ 'privacy-blurred': isBlurred(item.path) }"
                      loading="lazy"
                      :src="thumbUrl(item.thumb)"
                      :alt="item.name"
                    />
                    <div v-else class="video-placeholder" :class="{ 'privacy-soften': isBlurred(item.path) }">
                      <span class="icon">{{ item.kind === 'video' ? '▶' : '🎮' }}</span>
                      <span class="label">{{ getKindLabel(item.kind) }}</span>
                    </div>
                    <span class="kind-badge" :class="getKindClass(item.kind)">{{ getKindLabel(item.kind) }}</span>
                    <label class="thumb-privacy-toggle" @click.stop>
                      <input
                        type="checkbox"
                        :checked="isBlurred(item.path)"
                        @change="toggleItemBlur(item, $event)"
                      />
                      <span class="mini-track"></span>
                      <span class="mini-label">{{ isBlurred(item.path) ? 'Blur On' : 'Blur' }}</span>
                    </label>
                  </div>
                  <div class="meta">
                    <div class="name">{{ item.name }}</div>
                    <div class="path">{{ item.path }}</div>
                  </div>
                </article>
              </div>
            </section>
          </div>
        </div>

        <div v-if="settingsOpen && selectedItem" class="drawer-backdrop" @click="closeSettings"></div>
        <aside v-if="settingsOpen && selectedItem" class="settings-drawer">
          <div class="detail-content">
            <div class="detail-header">
              <div>
                <div class="detail-title">{{ selectedItem.name }}</div>
                <div class="detail-sub">{{ getKindLabel(selectedItem.kind) }} · {{ selectedSettingsCount }} settings</div>
              </div>
              <button class="btn drawer-close" @click="closeSettings">×</button>
            </div>

            <div class="selected-preview">
              <img
                v-if="selectedPreviewThumb()"
                :src="selectedPreviewThumb()"
                :alt="selectedItem.name"
                :class="{ 'privacy-soften': selectedItemBlurred }"
              />
              <div v-else class="selected-preview-fallback" :class="{ 'privacy-soften': selectedItemBlurred }">
                <span class="icon">{{ selectedItem.kind === 'video' ? '▶' : '🎮' }}</span>
                <span>{{ selectedItem.name }}</span>
              </div>
            </div>

            <div class="detail-path">{{ selectedItem.path }}</div>

            <button class="btn btn-accent" @click="applySelectedWallpaper">Apply This Wallpaper</button>

            <div v-if="propertyState.loading" class="property-placeholder">Loading project settings...</div>
            <div v-else-if="propertyState.error" class="property-placeholder error">{{ propertyState.error }}</div>
            <div v-else-if="selectedItem.kind !== 'project'" class="property-placeholder">
              This item is not a Wallpaper Engine project, so it has no editable Wallpaper Engine properties.
            </div>
            <div v-else-if="!propertyState.properties.length" class="property-placeholder">
              This project does not expose editable properties.
            </div>
            <div v-else class="property-list">
              <div v-for="prop in propertyState.properties" :key="prop.key" class="property-card">
                <div class="property-top">
                  <label class="property-label">{{ prop.label }}</label>
                  <span class="property-kind">{{ prop.kind }}</span>
                </div>

                <div v-if="prop.kind === 'boolean'" class="property-control boolean-control">
                  <label class="toggle">
                    <input
                      type="checkbox"
                      :checked="propertyDrafts[prop.key] === '1'"
                      @change="setBooleanProperty(prop, $event.target.checked)"
                    />
                    <span class="toggle-track"></span>
                    <span class="toggle-text">{{ propertyDrafts[prop.key] === '1' ? 'On' : 'Off' }}</span>
                  </label>
                </div>

                <div v-else-if="prop.kind === 'slider'" class="property-control slider-control">
                  <input
                    type="range"
                    :min="sliderMin(prop)"
                    :max="sliderMax(prop)"
                    :step="sliderStep(prop)"
                    v-model="propertyDrafts[prop.key]"
                    @change="saveProjectProperty(prop)"
                  />
                  <div class="slider-meta">
                    <span>{{ sliderMin(prop) }}</span>
                    <strong>{{ propertyDrafts[prop.key] }}</strong>
                    <span>{{ sliderMax(prop) }}</span>
                  </div>
                </div>

                <div v-else-if="prop.kind === 'color'" class="property-control color-control">
                  <input
                    type="color"
                    v-model="propertyDrafts[prop.key]"
                    @change="saveProjectProperty(prop)"
                  />
                  <code>{{ propertyDrafts[prop.key] }}</code>
                </div>

                <div v-else-if="prop.options?.length" class="property-control">
                  <select v-model="propertyDrafts[prop.key]" @change="saveProjectProperty(prop)">
                    <option v-for="option in prop.options" :key="option.value" :value="option.value">
                      {{ option.label }}
                    </option>
                  </select>
                </div>

                <div v-else class="property-control text-control">
                  <input
                    type="text"
                    v-model="propertyDrafts[prop.key]"
                    @keydown.enter.prevent="saveProjectProperty(prop)"
                  />
                  <button class="btn" @click="saveProjectProperty(prop)">Save</button>
                </div>
              </div>
            </div>
          </div>
        </aside>

        <!-- Floating Preview -->
        <div
          v-if="previewItem"
          class="floating-preview"
          :class="{ visible: previewItem }"
          :style="{ left: previewPos.x + 'px', top: previewPos.y + 'px' }"
        >
          <img
            v-if="previewItem.kind === 'image'"
            :src="mediaUrl(previewItem.path)"
            :alt="previewItem.name"
            :class="{ 'privacy-soften': isBlurred(previewItem.path) }"
          />
          <video
            v-else-if="previewItem.kind === 'video'"
            :src="mediaUrl(previewItem.path)"
            autoplay
            loop
            muted
            playsinline
            :class="{ 'privacy-soften': isBlurred(previewItem.path) }"
          />
          <img
            v-else-if="previewItem.thumb"
            :src="thumbUrl(previewItem.thumb)"
            :alt="previewItem.name"
            :class="{ 'privacy-soften': isBlurred(previewItem.path) }"
          />
          <div v-else class="project-preview" :class="{ 'privacy-soften': isBlurred(previewItem.path) }">
            <span class="icon">🎮</span>
            <span class="name">{{ previewItem.name }}</span>
          </div>
        </div>
      `
    }

    createApp(App).mount('#app')
  </script>
</body>
</html>
